<!--
  ============================================================
   *.dreamitbiz.com 공용 Open Graph / Twitter 메타 태그 스니펫
  ============================================================

  사용법:
    1) 아래 {{...}} 자리표시자를 사이트 값으로 치환해 <head>에 붙여넣는다.
    2) /public/og-image.png 를 1200x630 PNG로 준비한다
       (scripts/og-template/generate-og-image.template.mjs 참고).

  필수 치환 항목:
    {{SITE_URL}}       예) https://books.dreamitbiz.com
    {{SITE_HOST}}      예) books.dreamitbiz.com         (https:// 와 / 제외)
    {{SITE_TITLE}}     예) DreamIT Books — 드림아이티 출판
    {{SITE_DESC}}      120자 이내 권장
    {{SITE_THEME}}     예) #0046C8
    {{SITE_NAME}}      og:site_name 값 (브랜드명) — 기본 "DreamIT Biz"
-->
<meta name="description" content="{{SITE_DESC}}" />
<meta name="author" content="DreamIT Biz" />
<meta name="theme-color" content="{{SITE_THEME}}" />
<meta name="robots" content="index, follow" />
<link rel="canonical" href="{{SITE_URL}}/" />

<!-- Open Graph (Kakao / Facebook / LinkedIn 등) -->
<meta property="og:url" content="{{SITE_URL}}/" />
<meta property="og:type" content="website" />
<meta property="og:title" content="{{SITE_TITLE}}" />
<meta property="og:description" content="{{SITE_DESC}}" />
<meta property="og:image" content="{{SITE_URL}}/og-image.png" />
<meta property="og:image:secure_url" content="{{SITE_URL}}/og-image.png" />
<meta property="og:image:type" content="image/png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:image:alt" content="{{SITE_TITLE}}" />
<meta property="og:site_name" content="{{SITE_NAME}}" />
<meta property="og:locale" content="ko_KR" />

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:domain" content="{{SITE_HOST}}" />
<meta name="twitter:url" content="{{SITE_URL}}/" />
<meta name="twitter:title" content="{{SITE_TITLE}}" />
<meta name="twitter:description" content="{{SITE_DESC}}" />
<meta name="twitter:image" content="{{SITE_URL}}/og-image.png" />
<meta name="twitter:image:alt" content="{{SITE_TITLE}}" />
